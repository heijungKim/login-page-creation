services:
  mysql:
    image: mysql:8.0
    container_name: freed-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: freed2024
      MYSQL_DATABASE: freed_erp
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pfreed2024"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
    container_name: freed-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mysql://mysql:3306/freed_erp?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
      DB_USERNAME: root
      DB_PASSWORD: freed2024
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://192.168.0.15:3000
      JWT_SECRET: ZnJlZWQtZXJwLXN1cGVyLXNlY3JldC1rZXktZm9yLWp3dC1zaWduaW5nLTIwMjQ=
      JWT_ACCESS_TTL: 31536000
      ADMIN_BOOTSTRAP_USERNAME: admin
      ADMIN_BOOTSTRAP_PASSWORD: admin1234
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    container_name: freed-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      - backend

volumes:
  mysql_data:
